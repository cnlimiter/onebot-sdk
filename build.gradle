plugins {
    id 'java'
    id 'maven-publish'
    id 'com.github.johnrengelman.shadow' version '7.1.2'
}

version = project.sdk_version
group = project.maven_group


tasks.withType(JavaCompile).configureEach {
    it.options.encoding = "UTF-8"
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(8)
    archivesBaseName = project.archives_base_name
}



repositories {
    mavenCentral()
}

dependencies {
    shadow 'org.projectlombok:lombok:1.18.24'
    compileOnly 'com.google.code.gson:gson:2.8.9'
    compileOnly 'org.jetbrains:annotations:20.1.0'
    compileOnly 'org.slf4j:slf4j-api:1.7.30'
    shadow 'org.java-websocket:Java-WebSocket:1.5.1'

    annotationProcessor 'org.projectlombok:lombok:1.18.24'
    annotationProcessor 'com.google.code.gson:gson:2.8.9'
    annotationProcessor 'org.jetbrains:annotations:20.1.0'
    annotationProcessor 'org.slf4j:slf4j-api:1.7.30'
    annotationProcessor 'org.java-websocket:Java-WebSocket:1.5.1'

}

artifacts {
    archives jar
    archives shadowJar
}


shadowJar {
    project.configurations.shadow.setTransitive(true);
    configurations = [project.configurations.shadow]
    relocate 'org.java_websocket', "cn.evolvefield.onebot.sdk.websocket"
    dependencies {
        exclude(dependency('org.slf4j:slf4j-api:.*'))
    }
    classifier = ""
    archiveBaseName.set(project.archives_base_name)
    archiveVersion.set(project.sdk_version)

}

publishing {
    publications {
        shadow(MavenPublication) { publication ->
            project.shadow.component(publication)
            version = "${project.sdk_version}"
            artifactId = "${project.archives_base_name}"
            groupId = "${project.maven_group}"
            pom {
                name = 'OneBot SDK'
                description = '基于java开发的 [OneBot] 协议端'
                url = 'https://github.com/cnlimiter/onebot-sdk'
                licenses {
                    license {
                        name = 'AGPLV3'
                        url = 'https://www.gnu.org/licenses/gpl-3.0.html'
                    }
                }
                developers {
                    developer {
                        id = 'cnlimiter'
                        name = 'cnlimiter'
                        email = 'cnlimiter@163.com'
                    }
                }
            }
        }
    }

    repositories {
        if (System.getenv('MAVEN_USERNAME') != null && System.getenv('MAVEN_PASSWORD') != null) {
            maven {
                name 'release'
                url = 'https://maven.nova-committee.cn/releases'

                credentials {
                    username System.getenv('MAVEN_USERNAME')
                    password System.getenv('MAVEN_PASSWORD')
                }
            }
        }
    }
}
